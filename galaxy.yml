---
# purpose: Ansible Galaxy metadata for hybridops.app collection
# adr: ADR-0606-ansible-collections-release-process
# maintainer: HybridOps.Studio

namespace: hybridops
name: app
version: "0.1.0"

readme: README.md
description: >-
  Application and platform roles for the HybridOps.Studio automation platform, including Jenkins, RKE2, NetBox,
  Moodle, and core Linux/Windows services.

authors:
  - HybridOps.Studio

license:
  - MIT-0

min_ansible_version: "2.15"

tags:
  - hybridops
  - platform
  - automation
  - jenkins
  - rke2
  - netbox
  - moodle
  - linux
  - windows

homepage: https://docs.hybridops.studio
documentation: https://docs.hybridops.studio
repository: https://github.com/hybridops-studio/ansible-collection-app
issues: https://github.com/hybridops-studio/ansible-collection-app/issues

dependencies:
  hybridops.common: ">=0.1.0"
  hybridops.helper: ">=0.1.0"

build_ignore:
  - .git
  - .github
  - .tox
  - .venv
  - build
  - dist
  - output
  - tests/output
  - __pycache__
  - .mypy_cache
  - .pytest_cache
