---
# purpose: Ansible Galaxy metadata for hybridops.app collection
# adr: ADR-0606-ansible-collections-release-process
# maintainer: HybridOps.Tech

namespace: hybridops
name: app
version: "0.1.3"

readme: README.md
description: >-
  Application and platform roles for HybridOps, including Jenkins, RKE2,
  NetBox, Moodle, and core Linux/Windows services.

authors:
  - HybridOps.Tech

license:
  - MIT-0

tags:
  - hybridops
  - platform
  - automation
  - jenkins
  - rke2
  - netbox
  - moodle
  - linux
  - windows

homepage: https://hybridops.tech
documentation: https://docs.hybridops.tech
repository: https://github.com/hybridops-tech/ansible-collection-app
issues: https://github.com/hybridops-tech/ansible-collection-app/issues

dependencies:
  hybridops.common: ">=0.1.0"
  hybridops.helper: ">=0.1.0"

build_ignore:
  - .git
  - .github
  - .tox
  - .venv
  - build
  - dist
  - output
  - tests/output
  - __pycache__
  - .mypy_cache
  - .pytest_cache
