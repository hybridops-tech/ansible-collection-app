---
# purpose: Smoke test for hybridops.app.jenkins_controller
# note: 'cicd_test' is an example inventory group used in the HybridOps.Tech lab.
# prerequisite: Docker Engine + Compose v2 must already be installed on the target host
#               (for example via hybridops.common.docker_engine in a higher-level playbook).

- name: Smoke-test Jenkins controller on cicd_test hosts
  hosts: cicd_test
  become: true
  gather_facts: true

  vars:
    jenkins_home_path: "/opt/jenkins"
    jenkins_external_http_port: 8080
    jenkins_external_agent_port: 50000
    jenkins_admin_password: >-
      {{
        lookup('ansible.builtin.env', 'JENKINS_ADMIN_PASSWORD')
        | default('', true)
        | string
        | trim
      }}

    # Bootstrap / CI behaviour: allow controller to execute a trivial job before agents exist.
    jenkins_controller_num_executors: 1
    jenkins_enable_healthcheck: true

    # Secret injection:
    # Provide JENKINS_ADMIN_PASSWORD via CI secret store / Vault / env before running.
    # The role fails fast if this is empty.

  roles:
    - role: hybridops.app.jenkins_controller
