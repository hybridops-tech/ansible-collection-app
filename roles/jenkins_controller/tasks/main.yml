# purpose: Orchestrate Jenkins controller image build and deployment
# adr: ADR-0603-run-jenkins-controller-on-control-node-agents-on-rke2
# maintainer: HybridOps.Studio

- name: Build Jenkins controller image and render baseline configuration
  ansible.builtin.import_tasks: build.yml
  tags:
  - jenkins
  - jenkins_controller
  - build

- name: Deploy Jenkins controller stack
  ansible.builtin.import_tasks: deploy.yml
  tags:
  - jenkins
  - jenkins_controller
  - deploy

- name: Bootstrap admin API token for automation
  ansible.builtin.include_tasks: api_token.yml
