- name: Stage JCasC secrets (GCP)
  when:
    - jenkins_casc_secrets_enabled | bool
    - jenkins_casc_secrets_stage | default(false) | bool
  block:
    - name: Assert GCP runner key source path is provided
      ansible.builtin.assert:
        that:
          - (jenkins_gcp_runner_sa_key_src | default('') | string | trim | length) > 0
        fail_msg: >-
          jenkins_casc_secrets_enabled=true but jenkins_gcp_runner_sa_key_src is empty.
          Set JENKINS_GCP_RUNNER_SA_KEY_SRC or define
          jenkins_gcp_runner_sa_key_src.
      no_log: true

    - name: Ensure JCasC secret directory exists
      ansible.builtin.file:
        path: "{{ jenkins_home_path }}/jenkins_home/casc_secrets/gcp"
        state: directory
        owner: "{{ jenkins_uid }}"
        group: "{{ jenkins_gid }}"
        mode: "0750"
      no_log: true

    - name: Copy GCP runner SA key JSON into JCasC secrets area
      ansible.builtin.copy:
        src: "{{ jenkins_gcp_runner_sa_key_src }}"
        dest: "{{ jenkins_home_path }}/jenkins_home/casc_secrets/gcp/ci-runner-sa.json"
        owner: "{{ jenkins_uid }}"
        group: "{{ jenkins_gid }}"
        mode: "0640"
      no_log: true

- name: Cleanup staged JCasC secret (GCP)
  when:
    - jenkins_casc_secrets_enabled | bool
    - jenkins_casc_secrets_delete_staged | default(true) | bool
    - jenkins_casc_secrets_cleanup | default(false) | bool
  block:
    - name: Delete staged GCP runner SA key after JCasC import
      ansible.builtin.file:
        path: "{{ jenkins_home_path }}/jenkins_home/casc_secrets/gcp/ci-runner-sa.json"
        state: absent
      no_log: true
