---
# purpose: Configure Jenkins Kubernetes cloud for RKE2 pod agents via JCasC, optionally manage K8s SA/RBAC/token
# adr: ADR-0603-run-jenkins-controller-on-control-node-agents-on-rke2
# maintainer: HybridOps.Studio

- name: End host when RKE2 agents are disabled
  ansible.builtin.meta: end_host
  when: not (jenkins_agents_rke2_enabled | bool)

- name: Validate required inputs
  ansible.builtin.assert:
    that:
    - (jenkins_agents_rke2_server_url | string | trim | length) > 0
    - (jenkins_agents_rke2_jenkins_url | string | trim | length) > 0
    fail_msg: >-
      jenkins_agents_rke2_server_url and jenkins_agents_rke2_jenkins_url are required. server_url is the Kubernetes API endpoint for the Jenkins Kubernetes plugin. jenkins_url must be reachable from pods (not localhost).
  changed_when: false

- name: Ensure JCasC directory exists
  ansible.builtin.file:
    path: "{{ jenkins_casc_dir }}"
    state: directory
    mode: "0755"
  become: true

# --- Kubernetes-side resources (optional) --------------------------------------

- name: Manage Kubernetes prerequisites (namespace/sa/rbac/token)
  when: jenkins_agents_rke2_manage_k8s | bool
  block:
  - name: Ensure kubernetes.core collection is available
    ansible.builtin.assert:
      that:
      - true
      fail_msg: "kubernetes.core collection must be installed to manage RKE2 resources."
    changed_when: false

  - name: Ensure namespace exists
    kubernetes.core.k8s:
      kubeconfig: "{{ jenkins_agents_rke2_kubeconfig }}"
      context: "{{ jenkins_agents_rke2_kubecontext | default(omit) }}"
      state: present
      definition:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: "{{ jenkins_agents_rke2_namespace }}"

  - name: Ensure service account exists
    kubernetes.core.k8s:
      kubeconfig: "{{ jenkins_agents_rke2_kubeconfig }}"
      context: "{{ jenkins_agents_rke2_kubecontext | default(omit) }}"
      state: present
      definition:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: "{{ jenkins_agents_rke2_service_account_name }}"
          namespace: "{{ jenkins_agents_rke2_namespace }}"

  - name: Ensure RBAC exists (namespace-local)
    when: jenkins_agents_rke2_create_rbac | bool
    kubernetes.core.k8s:
      kubeconfig: "{{ jenkins_agents_rke2_kubeconfig }}"
      context: "{{ jenkins_agents_rke2_kubecontext | default(omit) }}"
      state: present
      definition:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: jenkins-agents
          namespace: "{{ jenkins_agents_rke2_namespace }}"
        rules:
        - apiGroups: [ "" ]
          resources: [ "pods", "pods/log", "pods/exec", "services", "configmaps", "secrets" ]
          verbs: [ "get", "list", "watch", "create", "delete", "patch", "update" ]
        - apiGroups: [ "apps" ]
          resources: [ "deployments", "replicasets" ]
          verbs: [ "get", "list", "watch" ]

  - name: Bind service account to role
    when: jenkins_agents_rke2_create_rbac | bool
    kubernetes.core.k8s:
      kubeconfig: "{{ jenkins_agents_rke2_kubeconfig }}"
      context: "{{ jenkins_agents_rke2_kubecontext | default(omit) }}"
      state: present
      definition:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: jenkins-agents
          namespace: "{{ jenkins_agents_rke2_namespace }}"
        subjects:
        - kind: ServiceAccount
          name: "{{ jenkins_agents_rke2_service_account_name }}"
          namespace: "{{ jenkins_agents_rke2_namespace }}"
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: jenkins-agents

  - name: Ensure token secret exists (legacy SA token style)
    when: (jenkins_agents_rke2_k8s_token | default('') | string | trim | length) == 0
    kubernetes.core.k8s:
      kubeconfig: "{{ jenkins_agents_rke2_kubeconfig }}"
      context: "{{ jenkins_agents_rke2_kubecontext | default(omit) }}"
      state: present
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: "{{ jenkins_agents_rke2_token_secret_name }}"
          namespace: "{{ jenkins_agents_rke2_namespace }}"
          annotations:
            kubernetes.io/service-account.name: "{{ jenkins_agents_rke2_service_account_name }}"
        type: kubernetes.io/service-account-token

  - name: Wait for token to be populated in the secret
    when: (jenkins_agents_rke2_k8s_token | default('') | string | trim | length) == 0
    kubernetes.core.k8s_info:
      kubeconfig: "{{ jenkins_agents_rke2_kubeconfig }}"
      context: "{{ jenkins_agents_rke2_kubecontext | default(omit) }}"
      api_version: v1
      kind: Secret
      name: "{{ jenkins_agents_rke2_token_secret_name }}"
      namespace: "{{ jenkins_agents_rke2_namespace }}"
    register: _sa_secret
    retries: 30
    delay: 2
    until: >
      (_sa_secret.resources | length) > 0 and ((_sa_secret.resources[0].data.token | default('') | string | length) > 0)
    no_log: true

  - name: Set Jenkins Kubernetes token from secret
    when: (jenkins_agents_rke2_k8s_token | default('') | string | trim | length) == 0
    ansible.builtin.set_fact:
      jenkins_agents_rke2_k8s_token: "{{ (_sa_secret.resources[0].data.token | b64decode) | trim }}"
    no_log: true
    changed_when: false

# --- Validate token provided/available -----------------------------------------

- name: Fail when Kubernetes token is not available
  ansible.builtin.assert:
    that:
    - (jenkins_agents_rke2_k8s_token | default('') | string | trim | length) > 0
    fail_msg: >-
      No Kubernetes token is available for Jenkins Kubernetes plugin. Provide jenkins_agents_rke2_k8s_token, or set jenkins_agents_rke2_manage_k8s=true so the role can create a ServiceAccount token secret.
  no_log: true
  changed_when: false

# --- Render JCasC --------------------------------------------------------------

- name: Render Kubernetes cloud JCasC (RKE2)
  ansible.builtin.template:
    src: "casc_configs/35-cloud-rke2.yaml.j2"
    dest: "{{ jenkins_casc_dir }}/35-cloud-rke2.yaml"
    mode: "0640"
  become: true
  no_log: true

# --- Restart controller to apply config (simple + predictable) -----------------

- name: Restart Jenkins controller container to apply JCasC
  when: jenkins_agents_rke2_restart_controller | bool
  community.docker.docker_container:
    name: "{{ jenkins_controller_container_name }}"
    state: started
    restart: true
  become: true
