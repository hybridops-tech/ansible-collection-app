---
# purpose: Smoke test for hybridops.app.jenkins_agents_rke2
# maintainer: HybridOps.Studio
#
# This role requires an RKE2 API endpoint and a bearer token when enabled.
# Until RKE2 is available, keep it disabled so the collection test harness can run.

- name: Smoke-test Jenkins RKE2 agents configuration on cicd_test hosts
  hosts: cicd_test
  become: true
  gather_facts: true

  collections:
  - hybridops.app

  vars:
    jenkins_agents_rke2_enabled: false
    # Secret injection:
    # Provide JENKINS_ADMIN_PASSWORD via CI secret store / Vault / env before running.
    # The role fail fast if this is empty.

  roles:
  - role: jenkins_agents_rke2
